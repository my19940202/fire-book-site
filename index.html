<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="开启FIRE时光，让家庭财富成长的每一步" />
  <title>FIRE记账</title>
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="stylesheet" href="./fonts.css" />
  <script>
    (function () {
      var narrow = window.matchMedia('(max-width: 768px)').matches;
      var mobileUa = /Android|iPhone|iPod|Mobile/i.test(navigator.userAgent);
      var platform = narrow || mobileUa ? 'h5' : 'web';
      document.documentElement.classList.add('platform-' + platform);
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = platform === 'h5' ? './styles.h5.css' : './styles.web.css';
      document.head.appendChild(link);
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Source Han Sans CN"', 'sans-serif'],
          },
          colors: {
            brand: {
              DEFAULT: '#3B82F6',
              light: '#EFF6FF',
              dark: '#2563EB',
            },
            navy: '#0F1623',
          },
        },
      },
    };
  </script>
</head>
<body class="bg-white text-navy antialiased">
  <div id="app">
    <p class="loading">加载中...</p>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
